# Symphony daemon configuration
# Edit projects below, then run: symphony daemon
#
# Docs: https://github.com/J132134/symphony

projects:
  - name: my-project
    workflow: ~/.config/symphony/workflows/my-project.md
  # - name: another-project
  #   workflow: ~/.config/symphony/workflows/another-project.md

status_server:
  enabled: true
  port: 7777

auto_update:
  enabled: true
  interval_minutes: 30
