name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: |
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X symphony/internal/version.version=${GITHUB_REF_NAME}" \
            -o symphony-darwin-arm64 ./cmd/symphony
      - name: Import Developer ID certificate
        env:
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          missing=0
          for var in \
            MACOS_DEVELOPER_ID_APPLICATION_IDENTITY \
            MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 \
            MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Missing required release signing secret: ${var}"
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

          KEYCHAIN="${RUNNER_TEMP}/symphony-signing.keychain-db"
          KEYCHAIN_PASSWORD="symphony-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CERT_PATH="${RUNNER_TEMP}/developer-id-application.p12"

          CERT_PATH="${CERT_PATH}" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert = base64.b64decode(os.environ["MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64"])
          Path(os.environ["CERT_PATH"]).write_bytes(cert)
          PY
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security import "${CERT_PATH}" -k "${KEYCHAIN}" -P "${MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          CURRENT_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "${KEYCHAIN}" ${CURRENT_KEYCHAINS}
      - name: Sign release binary
        env:
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp --sign "${MACOS_DEVELOPER_ID_APPLICATION_IDENTITY}" symphony-darwin-arm64
          CODESIGN_INFO="$(codesign -dv --verbose=4 symphony-darwin-arm64 2>&1)"
          echo "${CODESIGN_INFO}"
          if [[ "${CODESIGN_INFO}" == *"Signature=adhoc"* ]] || [[ "${CODESIGN_INFO}" == *"TeamIdentifier=not set"* ]] || [[ "${CODESIGN_INFO}" != *"Authority=Developer ID Application:"* ]]; then
            echo "::error::Release binary is not Developer ID Application signed; refusing to publish."
            exit 1
          fi
          codesign --verify --verbose=4 symphony-darwin-arm64
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${GITHUB_REF_NAME} --title "${GITHUB_REF_NAME}" --generate-notes symphony-darwin-arm64
      - name: Cleanup signing keychain
        if: always()
        run: security delete-keychain "${RUNNER_TEMP}/symphony-signing.keychain-db" 2>/dev/null || true
